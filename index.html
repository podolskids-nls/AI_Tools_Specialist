<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дашборд заказов</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Golos+Text:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:       #0b0b0f;
      --surface:  #13131a;
      --border:   #1f1f2e;
      --accent:   #c8f04a;
      --accent2:  #7b5cff;
      --text:     #f0f0f0;
      --muted:    #6b6b80;
      --radius:   16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Golos Text', sans-serif;
      min-height: 100vh;
      padding: 40px 24px 80px;
    }

    /* noise overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .wrap { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }

    /* header */
    header { margin-bottom: 48px; }
    .logo {
      font-family: 'Unbounded', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--muted); margin-top: 8px; font-size: 14px; }

    /* KPI cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .kpi.visible { opacity: 1; transform: translateY(0); }
    .kpi::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
    }
    .kpi:nth-child(2)::after { background: var(--accent2); }
    .kpi:nth-child(3)::after { background: #f04a8a; }
    .kpi-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .kpi-value {
      font-family: 'Unbounded', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
    .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

    /* chart card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease 0.2s, transform 0.6s ease 0.2s;
    }
    .card.visible { opacity: 1; transform: translateY(0); }
    .card-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }
    canvas { width: 100% !important; }

    /* state messages */
    #status {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 14px;
    }
    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
    }

    /* utm table */
    .utm-grid {
      display: grid;
      gap: 10px;
    }
    .utm-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .utm-label {
      width: 90px;
      font-size: 13px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .utm-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .utm-bar {
      height: 100%;
      border-radius: 99px;
      background: var(--accent2);
      width: 0;
      transition: width 1s cubic-bezier(.16,1,.3,1);
    }
    .utm-count {
      font-family: 'Unbounded', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      width: 24px;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Analytics</div>
    <h1>Заказы<br/><span>по городам</span></h1>
    <p class="subtitle">Данные из Supabase · RetailCRM</p>
  </header>

  <div id="status"><span class="dot"></span>Загружаем данные...</div>

  <div id="content" style="display:none">
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-label">Всего заказов</div>
        <div class="kpi-value" id="kpi-total">—</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Топ город</div>
        <div class="kpi-value" id="kpi-city" style="font-size:18px">—</div>
        <div class="kpi-sub" id="kpi-city-count"></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Топ источник</div>
        <div class="kpi-value" id="kpi-utm" style="font-size:18px">—</div>
        <div class="kpi-sub" id="kpi-utm-count"></div>
      </div>
    </div>

    <div class="card" id="card-chart">
      <div class="card-title">Заказы по городам</div>
      <canvas id="cityChart" height="300"></canvas>
    </div>

    <div class="card" id="card-utm">
      <div class="card-title">Источники трафика</div>
      <div class="utm-grid" id="utm-grid"></div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://cgqknkoesmrctvlzuspe.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_DkhksoIb3VHOZjTbdfHKww_7tUDDbSX';

  async function fetchOrders() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/orders?select=city,utm_source`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        }
      }
    );
    if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
    return res.json();
  }

  function count(arr, key) {
    return arr.reduce((acc, row) => {
      const val = row[key] || 'Не указан';
      acc[val] = (acc[val] || 0) + 1;
      return acc;
    }, {});
  }

  function animateIn(els) {
    els.forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 100);
    });
  }

  function renderChart(cityMap) {
    const sorted = Object.entries(cityMap).sort((a, b) => b[1] - a[1]);
    const labels = sorted.map(([k]) => k);
    const values = sorted.map(([, v]) => v);

    const ctx = document.getElementById('cityChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: labels.map((_, i) =>
            i === 0 ? '#c8f04a' : '#1f1f2e'
          ),
          borderColor: labels.map((_, i) =>
            i === 0 ? '#c8f04a' : '#2e2e42'
          ),
          borderWidth: 1,
          borderRadius: 8,
          hoverBackgroundColor: '#c8f04a33',
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#13131a',
            borderColor: '#1f1f2e',
            borderWidth: 1,
            titleColor: '#6b6b80',
            bodyColor: '#f0f0f0',
            bodyFont: { family: 'Unbounded', size: 14, weight: '700' },
            callbacks: {
              title: () => '',
              label: ctx => `  ${ctx.label}: ${ctx.parsed.y} заказов`,
            }
          }
        },
        scales: {
          x: {
            grid: { color: '#1f1f2e' },
            ticks: { color: '#6b6b80', font: { family: 'Golos Text', size: 13 } },
          },
          y: {
            grid: { color: '#1f1f2e' },
            ticks: {
              color: '#6b6b80',
              font: { family: 'Unbounded', size: 11, weight: '700' },
              stepSize: 1,
            },
            beginAtZero: true,
          }
        }
      }
    });
  }

  function renderUtm(utmMap) {
    const sorted = Object.entries(utmMap).sort((a, b) => b[1] - a[1]);
    const max = sorted[0][1];
    const grid = document.getElementById('utm-grid');
    grid.innerHTML = sorted.map(([src, cnt]) => `
      <div class="utm-row">
        <div class="utm-label">${src}</div>
        <div class="utm-bar-wrap">
          <div class="utm-bar" data-pct="${cnt / max * 100}"></div>
        </div>
        <div class="utm-count">${cnt}</div>
      </div>
    `).join('');

    // animate bars
    setTimeout(() => {
      grid.querySelectorAll('.utm-bar').forEach(bar => {
        bar.style.width = bar.dataset.pct + '%';
      });
    }, 400);
  }

  async function main() {
    try {
      const orders = await fetchOrders();
      const cityMap = count(orders, 'city');
      const utmMap  = count(orders, 'utm_source');

      // KPI
      document.getElementById('kpi-total').textContent = orders.length;

      const topCity = Object.entries(cityMap).sort((a,b) => b[1]-a[1])[0];
      document.getElementById('kpi-city').textContent = topCity[0];
      document.getElementById('kpi-city-count').textContent = `${topCity[1]} заказов`;

      const topUtm = Object.entries(utmMap).sort((a,b) => b[1]-a[1])[0];
      document.getElementById('kpi-utm').textContent = topUtm[0];
      document.getElementById('kpi-utm-count').textContent = `${topUtm[1]} заказов`;

      // show content
      document.getElementById('status').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      renderChart(cityMap);
      renderUtm(utmMap);

      animateIn([
        ...document.querySelectorAll('.kpi'),
        document.getElementById('card-chart'),
        document.getElementById('card-utm'),
      ]);

    } catch (e) {
      document.getElementById('status').innerHTML =
        `❌ Ошибка загрузки данных: ${e.message}`;
    }
  }

  main();
</script>
</body>
</html>
